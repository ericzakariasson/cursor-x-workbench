<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinball</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hud">
        <h1>Pinball</h1>
        <p><strong>Score:</strong> <span id="score">0</span></p>
        <p><strong>Balls:</strong> <span id="balls">3</span></p>
        <p id="status">Hold Space to charge, release to launch.</p>
        <p class="help">Controls: Left/Right arrows (or A/D), Space, R</p>
      </section>
      <canvas id="game" width="480" height="720" aria-label="Pinball game board"></canvas>
    </main>
    <script src="game.js"></script>
  </body>
</html>
