<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Minesweeper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>RETRO MINESWEEPER</h1>
      <section class="panel">
        <div class="counter">
          <span class="label">MINES</span>
          <span id="mine-counter" class="value">000</span>
        </div>
        <button id="new-game" aria-label="Start a new game">:)</button>
        <div class="counter">
          <span class="label">TIME</span>
          <span id="timer" class="value">000</span>
        </div>
      </section>
      <p id="status" aria-live="polite">Left click to reveal, right click to flag.</p>
      <section class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="Minesweeper board"></div>
      </section>
      <p class="hint">Goal: Reveal all safe cells.</p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
